name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-matrix:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install -e ".[training,voice]"
        shell: bash
      
      - name: Build distribution (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install wheel
          python setup.py bdist_wheel
          python -m PyInstaller build/openclaw.spec --onefile --distpath dist/openclaw-linux-x86_64
        shell: bash
      
      - name: Build distribution (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install wheel
          python setup.py bdist_wheel
          python -m PyInstaller build/openclaw.spec --onefile --distpath dist/openclaw-windows-x86_64
        shell: bash
      
      - name: Build distribution (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install wheel
          python setup.py bdist_wheel
          python -m PyInstaller build/openclaw.spec --onefile --distpath dist/openclaw-macos-universal2
        shell: bash
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.os }}-artifacts
          path: dist/
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-matrix
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel twine build
      
      - name: Build distribution
        run: python -m build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
